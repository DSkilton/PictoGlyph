services:
  mysql:
    image: postgres:16
    container_name: pictoglyph_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: pictoglyph
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U user -d pictoglyph" ]
      interval: 30s
      timeout: 10s
      retries: 5

volumes:
  postgres_data: