spring.application.name=pictoglyphapi

spring.datasource.url=jdbc:mysql://localhost:3306/pictoglyph?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=user
spring.datasource.password=password
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

pictoglyph.seed.enabled=true
pictoglyph.ml.base-url=http://localhost:8001
